version: 2

sphinx:
  configuration: docs/source/conf.py

build:
  os: ubuntu-22.04

  tools:
    python: "mambaforge-4.10"

  jobs:
    post_create_environment:
      - python -c "import sys; print(sys.executable)"
      - python -c "import sys; print(sys.prefix)"
      - which gsl-config
      - gsl-config --version
      - gsl-config --prefix

conda:
  environment: docs/requirements.yaml

python:
  install:
    - method: pip
      path: .
      install_args:
        - --no-build-isolation