# readthedocs.yaml

version: 2

# Sphinx configuration
sphinx:
  configuration: docs/source/conf.py

# Uncomment the following lines to enable MkDocs configuration
# mkdocs:
#   configuration: docs/mkdocs.yml

build:
  os: ubuntu-22.04
  tools:
    python: "mambaforge-4.10"
  jobs:
    pre_build:
      - which gsl-config
      - gsl-config --version
      - echo $CONDA_PREFIX
      - ls $CONDA_PREFIX/include/gsl
      - ls $CONDA_PREFIX/lib/libgsl*
python:
  install:
    - method: pip
      path: .

conda:
  environment: docs/requirements.yaml
